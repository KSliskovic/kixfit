name: kixfit
description: KixFit - AI-Powered Fitness & Nutrition Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.2.3

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_analytics: any
  firebase_crashlytics: any

  # Google Sign In
  google_sign_in: ^7.2.0

  # AI / HTTP
  google_generative_ai: ^0.4.0
  http: ^1.2.1
  dio: ^5.4.3+1

  # Speech to Text
  speech_to_text: ^7.3.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: any

  # UI / Design
  fl_chart: ^1.2.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  google_fonts: ^8.1.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  permission_handler: ^12.0.1

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: any
  json_serializable: any
  riverpod_generator: any
  custom_lint: ^0.8.1
  riverpod_lint: any
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo_kixfit.png"
  min_sdk_android: 21 # android min sdk min:16, default:21
